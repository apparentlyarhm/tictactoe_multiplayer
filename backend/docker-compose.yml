services:
  nakama:
    build: .
    container_name: ttt_server
    # This runs the database migration first, then starts the server
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address "${NAKAMA_DATABASE_ADDRESS}" &&
        /nakama/nakama 
        --database.address "${NAKAMA_DATABASE_ADDRESS}" 
        --logger.level "INFO" 
        --session.token_expiry_sec 7200
        --session.refresh_token_expiry_sec 7200
        --socket.server_key "${SERVER_KEY}"
        --console.password "${CONSOLE_PASSWORD}"
    ports:
      - "7349:7349" # gRPC
      - "7350:7350" # HTTP / WebSocket (the frontend connects here)
      - "7351:7351" # Server-to-Server